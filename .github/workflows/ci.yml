name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify module entrypoint
        run: |
          python -m ai_proxy_hub --version
          python -m ai_proxy_hub --print-paths
      - name: Install package smoke test
        run: |
          python -m pip install .
          python -c "import shutil, subprocess; exe = shutil.which('ai-proxy-hub'); assert exe, 'ai-proxy-hub entrypoint missing'; subprocess.run([exe, '--version'], check=True)"
      - name: Run CLI tests
        run: python -m unittest discover -s tests -p "test_cli_modern.py" -v
      - name: Run release tests
        run: python -m unittest discover -s tests -p "test_release_preflight.py" -v
      - name: Run remote smoke tests
        run: python -m unittest discover -s tests -p "test_remote_linux_smoke.py" -v
      - name: Run router unit tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          sys.path.insert(0, "tests")
          suite = unittest.TestLoader().loadTestsFromNames(
              [
                  "test_router.ClientSwitchTest",
                  "test_router.CodexSwitchTest",
                  "test_router.CompatibilityLayerTest",
                  "test_router.HandlerLoggingTest",
                  "test_router.ProbeParsingTest",
              ]
          )
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
      - name: Run router platform tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          sys.path.insert(0, "tests")
          suite = unittest.TestLoader().loadTestsFromName("test_router.PlatformSupportTest")
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
      - name: Run router server tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          sys.path.insert(0, "tests")
          suite = unittest.TestLoader().loadTestsFromName("test_router.RouterServerTest")
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
      - name: Run router subscription tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          sys.path.insert(0, "tests")
          suite = unittest.TestLoader().loadTestsFromName("test_router.SubscriptionRulesTest")
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          PY
      - name: Verify packaging metadata
        run: python -m py_compile start.py router_server.py tests/test_router.py tests/test_release_preflight.py scripts/build_release.py scripts/verify_release_artifacts.py scripts/release_preflight.py scripts/sync_homebrew_tap.py
      - name: Release preflight
        run: python scripts/release_preflight.py --version 0.3.1 --skip-tests --skip-build
      - name: Build and verify release artifacts
        run: |
          python scripts/build_release.py --version 0.3.1-ci --output-dir dist-ci
          python scripts/verify_release_artifacts.py --dist-dir dist-ci --version 0.3.1-ci
